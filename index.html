<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PPL"/>
<title>PPL Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
:root{--ac:#e84a2f;--ac2:#ff6b4d;--bg:#0f0f0f;--su:#1a1a1a;--su2:#242424;--br:#2e2e2e;--tx:#f0f0f0;--mu:#777;--gr:#22c55e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow:hidden}
.screen{position:fixed;left:0;right:0;bottom:0;top:54px;top:env(safe-area-inset-top);overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:env(safe-area-inset-bottom)}
.screen.active{display:block}
.hdr{position:sticky;top:0;z-index:10;background:var(--su);border-bottom:1px solid var(--br);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ac)}
.hdr-sub{font-size:12px;color:var(--mu);margin-top:1px}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--ac);color:#fff;padding:14px 20px;font-size:15px;border-radius:10px;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--br);color:var(--mu);padding:11px 18px;font-size:15px}
.btn-sm{padding:11px 18px;font-size:15px}
.card{background:var(--su);border:1px solid var(--br);border-radius:10px}
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
input[type=number],textarea{background:var(--su2);color:var(--tx);border:1px solid var(--br);border-radius:6px;padding:8px 10px;font-size:15px;width:100%;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
input[type=number]:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:none}
input::placeholder,textarea::placeholder{color:#555}
.pill-strip{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;border-bottom:1px solid var(--br);scrollbar-width:none}
.pill-strip::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--br);background:var(--su2);color:var(--mu)}
.pill.cur{background:var(--ac);color:#fff;border-color:var(--ac)}
.pill.done{background:#1a3a1a;color:var(--gr);border-color:#2d5a2d}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--su);border-top:1px solid var(--br);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;border:none;background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:10px;gap:3px;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--ac)}
.tab-btn svg{width:22px;height:22px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--su);border-top:1px solid var(--br);padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:20}
.ex-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;line-height:1.05;text-transform:uppercase;letter-spacing:.5px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.stat-box{background:var(--su);border:1px solid var(--br);border-radius:8px;padding:8px 6px;text-align:center}
.stat-lbl{font-size:10px;color:var(--mu);letter-spacing:.5px;margin-bottom:2px}
.stat-val{font-size:13px;font-weight:500;line-height:1.2}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 44px;gap:8px;align-items:center}
.set-num{font-size:13px;color:var(--mu);text-align:center;font-weight:500}
.done-btn{height:40px;border-radius:8px;border:1px solid var(--br);background:var(--su2);color:var(--mu);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;width:100%}
.done-btn.done{border-color:var(--gr);background:#14532d;color:var(--gr)}
.sec-lbl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.note-prev{border-left:2px solid var(--br);padding-left:10px}
.note-prev-meta{font-size:11px;color:var(--mu);margin-bottom:2px}
.note-prev-text{font-size:14px;color:#ccc;line-height:1.4}
.session-card{background:var(--su);border:1px solid var(--br);border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.session-card.done-card{border-color:#2d5a2d}
.session-card:active{opacity:.7}
.wk-btn{padding:10px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--su);color:var(--mu);border:1px solid var(--br)}
.wk-btn.active{border-color:var(--ac);color:var(--tx);font-weight:500}
.ph-btn{flex:1;padding:12px 8px;border-radius:10px;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--su);color:var(--mu);border:1px solid var(--br)}
.ph-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.hist-row{padding:12px 14px;border-bottom:1px solid var(--br)}
.hist-row:last-child{border-bottom:none}
.sub-btn{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--su2);color:var(--mu);border:1px solid var(--br)}
.sub-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.badge{width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block}
</style>
</head>
<body>

<!-- HOME -->
<div id="scr-home" class="screen active">
  <div class="hdr">
    <div>
      <div class="hdr-title" style="color:var(--tx);font-size:28px">PPL <span style="color:var(--ac)">Tracker</span></div>
      <div class="hdr-sub">Jeff Nippard 4x/Week</div>
    </div>

  </div>
  <div style="padding:16px" id="home-body"></div>
</div>

<!-- WORKOUT -->
<div id="scr-workout" class="screen">
  <div class="hdr" id="wo-hdr"></div>
  <div class="pill-strip" id="wo-pills"></div>
  <div style="padding:16px;padding-bottom:120px" id="wo-body"></div>
  <div class="bottom-nav" id="wo-nav"></div>
</div>

<!-- HISTORY -->
<div id="scr-history" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">History</div><div class="hdr-sub" id="hist-sub"></div></div>

  </div>
  <div style="padding:16px" id="hist-body"></div>
</div>

<!-- SESSION DETAIL (read-only view of completed session) -->
<div id="scr-detail" class="screen">
  <div class="hdr">
    <div><div class="hdr-title" id="det-title"></div><div class="hdr-sub" id="det-sub"></div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" id="det-edit-btn">Edit</button>
      <button class="btn btn-ghost btn-sm" onclick="goBack()">← Back</button>
    </div>
  </div>
  <div style="padding:16px" id="det-body"></div>
</div>

<!-- SETTINGS -->
<div id="scr-settings" class="screen">
  <div class="hdr">
    <div><div class="hdr-title">Settings</div><div class="hdr-sub">Google Sheets sync</div></div>

  </div>
  <div style="padding:16px" id="settings-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// PROGRAM DATA
// ═══════════════════════════════════════════════════════════
const R = (v,n) => Array(n).fill(v);

const PROGRAM = {phases:[
  {id:1,name:"Phase 1",subtitle:"Base Hypertrophy",numWeeks:6,
   weekLabels:["Week 1","Week 2","Week 3","Week 4","Week 5","Week 6 — Semi-Deload"],
   sessionOrder:["Legs #1","Push #1","Pull #1","Full Body #1"],
   sessions:{
    "Legs #1":[

      {name:"Omni-Direction Face Pull",warmup:"1",working:[3,3,3,3,3,3],reps:["12-15","12-15","12-15","12-15","12-15","12-15"],rpe:["9-10","9-10","9-10","9-10","9-10","8"],rest:"~1-2 min",sub1:"Reverse Cable Flye",sub2:"Bent-Over Reverse DB Flye",notes:"Set 1: low-to-high. Set 2: mid-range. Set 3: high-to-low."},
      {name:"EZ-Bar Curl",warmup:"1",working:[3,3,3,3,3,2],reps:["6-8","6-8","6-8","6-8","6-8","6-8"],rpe:["9-10","9-10","9-10","9-10","9-10","8"],rest:"~1-2 min",sub1:"DB Curl",sub2:"Cable Curl",notes:"Focus on contracting your biceps, minimize torso momentum"},
      {name:"Bottom-Half Preacher Curl",warmup:"0",working:[2,2,2,2,2,2],reps:["10-12","10-12","10-12","10-12","10-12","10-12"],rpe:["10","10","10","10","10","8"],rest:"~1-2 min",sub1:"Bottom-Half Spider Curl",sub2:"Bottom-Half Bayesian Curl",notes:"Stay entirely in the stretched aspect (bottom half of ROM only)"},

  {id:2,name:"Phase 2",subtitle:"Maximum Effort",numWeeks:4,

const PHASE_NOTES = [
  "Moderate volume, moderate-high intensity. Push compounds to RPE 8-9 (1-2 reps left in the tank). Push isolation work to RPE 9-10. Goal is to lay a foundation of hypertrophy. Progress by adding reps each week until you hit the top of the rep range, then add a small amount of weight and start back at the bottom of the range.",

const JEFF_NOTES = {
  // ── Phase 1 & shared ───────────────────────────────────
  "Squat": "Sit back and down — not straight down. Keep your upper back tight to the bar throughout. Use autoregulation: if the bar speed feels slow, stay at the prescribed weight rather than pushing heavier. The single heavy set per week is intentional — enough to drive strength without overtaxing recovery for the rest of the workout.",
  "Pause Squat (Back off)": "Drop the weight ~25% from your top set. The 2-second pause at the bottom eliminates the stretch-shortening reflex and forces your muscles to generate force from a dead stop — it builds raw strength out of the hole. Keep your upper back tight throughout the pause.",
  "Barbell RDL": "This is a hip hinge — push your hips back, not down. The bar should travel close to your legs the entire time. Stop when your lower back starts to round, not necessarily when the weight reaches the floor. You should feel a strong stretch in your hamstrings at the bottom of each rep.",
  "Dumbbell RDL": "Dumbbells allow a greater ROM than a barbell since they can travel past your feet. Take advantage of this — get a deeper stretch in the hamstrings than you could with a bar. Same principle: hips back, neutral spine, feel the hamstring stretch.",
  "Walking Lunge": "Take medium strides — not too short (creates knee stress) and not too long (reduces quad tension). Keep your torso upright and minimize the push-off from your rear leg. You should feel this loading your quads and glutes, not your hip flexors.",
  "Seated Leg Curl": "Initiate the movement by squeezing your hamstrings — don't just move the weight with momentum. The hamstrings flex the knee and extend the hip; on the leg curl you're isolating the knee flexion function. Control the eccentric (the lowering) on every rep.",
  "Leg Press Toe Press": "Press all the way up to your toes — full plantar flexion at the top. Get a complete stretch at the bottom by letting the heel drop. No bouncing. The calves respond extremely well to full ROM and high reps.",
  "Seated Calf Raise": "The seated position (knee bent at ~90°) shortens the gastrocnemius so it can't contribute as much force, which better isolates the soleus. Full ROM — all the way up and all the way down with a pause at the stretch.",
  "Decline Plate-Weighted Crunch": "The key is spinal flexion — actively round your back as you crunch. Think about pulling your ribs toward your hips, not just bringing your chest toward your knees. The plate or DB increases the load and makes this a proper strength exercise for the abs.",
  "Cable Crunch": "Same as the decline crunch — focus on rounding your spine, not just hinging at the hips. The cable provides constant tension throughout the ROM. Round your back as you crunch.",
  "Bench Press": "Set your shoulder blades back and down before you unrack — this is your base of support. Quick pause on the chest and explode up on every rep. In Phase 3, your top set is immediately followed by a back-off AMRAP at 60% — use safety bars.",
  "Bench Press (Top Set)": "Set your shoulder blades back and down before you unrack. Quick pause on the chest — no bounce — and explode up on each rep.",
  "Bench Press (Back Off AMRAP)": "Use ~60% of your top set weight and do as many reps as possible. Target is 10-20+ reps. This is not a light pump set — push it to failure. Use a spotter and safety bars. This AMRAP is a primary hypertrophy driver in Phase 3.",
  "Larsen Press": "A bench press with your feet raised and zero leg drive. This removes the contribution of your legs and lower back and isolates the upper body completely. Shoulder blades still retracted and depressed. Maintain a slight arch in your upper back.",
  "Standing DB Arnold Press": "Start with your elbows in front of you and palms facing toward you. As you press, rotate the dumbbells so your palms face forward at the top. This rotation allows a greater ROM than a standard press and hits more of the front and lateral delt throughout the movement.",
  "A1. Press-Around": "A cable crossover where you press the cable across your body. Brace your non-working arm against a stable surface. Squeeze your pec as hard as possible at the end range. Do not rest between this and the Pec Static Stretch — move straight into the stretch.",
  "A2. Pec Static Stretch": "Research suggests combining training with targeted stretching may enhance hypertrophy in the stretched position. Hold at ~7/10 intensity — uncomfortable but not painful. This follows immediately after the Press-Around as a superset.",
  "Cross-Body Cable Y-Raise (Side Delt)": "Think about drawing a sword from your hip — the cable travels out and up at a diagonal. This angle applies more tension to the lateral delt throughout the ROM compared to a straight lateral raise.",
  "Squeeze-Only Tri Pressdown + OHT Ext": "This is a mechanical dropset — you do the bottom half of the pressdown ROM (the squeeze/contracted position) for 8 reps, then immediately transition to overhead extensions and do the top half of the ROM (the stretched position) for 8 reps. You're hitting both ends of the tricep's range without extra sets.",
  "N1-Style Cross-Body Triceps Extension": "Extend your tricep with your arm angled out to the side rather than straight down. As the cable travels across your torso on the eccentric, you should feel a deep stretch in the tricep. This stretch-focused ROM is the point of the exercise.",
  "Lat Pulldown (Feeder Sets)": "Feeder sets were popularized by John Meadows. You're progressively building the weight across 4 sets to fully activate the muscle before the hard set. Set 1: RPE 4-5. Set 2: RPE 6-7. Set 3: RPE 7-8. Set 4: push to failure at 10 reps. Each set should feel noticeably harder than the last.",
  "Lat Pulldown (Failure Set + Dropset)": "After hitting failure at ~10 reps, immediately strip the weight 30-50% and do 5 more controlled reps. The dropset extends the set past failure and adds more hypertrophic stimulus without extra rest time.",
  "Omni-Grip Machine Chest-Supported Row": "Using 3 different grips across 3 sets targets slightly different portions of the back. Wider grips emphasize upper back and rear delts. Closer grips emphasize the mid-lats. Going from wider to closer across the 3 sets works well.",
  "A1. Bottom-Half DB Lat Pullover": "Based on 2021-2022 research showing partial reps in the stretched position are highly effective for muscle growth. You stay entirely in the bottom half of the ROM — the fully stretched position — where the lat is under maximum tension. Do not complete the top half of the rep.",
  "A2. Lat Static Stretch": "Holds a lat stretch for 30 seconds immediately after the pullover. 7/10 intensity. This stretch-and-train pairing may enhance hypertrophy in the lats according to recent research.",
  "Omni-Direction Face Pull": "Changing the cable height each set targets different angles of the rear delt and upper back. Low-to-high (1st set) biases lower traps. Mid-range (2nd set) is balanced. High-to-low (3rd set) biases upper traps. Don't shortchange any of the three positions.",
  "EZ-Bar Curl": "Arc the bar out and away from your body rather than pulling straight up. This follows the natural line of pull for the biceps. Minimize torso momentum — the curl should be driven by bicep contraction, not swinging.",
  "EZ-Bar Curl (Heavy)": "In Phase 3, this is a single heavy set at 4-6 reps before moving into the high-rep 21s. Arc the bar out, squeeze the biceps, keep momentum minimal.",
  "Bottom-Half Preacher Curl": "Same principle as the lat pullover — you stay in the bottom half of the ROM which is the stretched position for the bicep. Research supports that stretch-focused partial reps may match or exceed full ROM training for hypertrophy. Do not complete the top half of the curl.",
  "Deadlift": "Brace your lats against the bar before pulling — think 'protect your armpits'. Pull the slack out of the bar before you actually lift off the floor. In Phase 2, conventional or sumo both work — go with whichever you're stronger at.",
  "Stiff-Leg Deadlift": "Think of this as a high-hip conventional deadlift — hips are higher than a normal deadlift, knees stay slightly bent (not locked). The bar returns to the floor on each rep. This targets the hamstrings more than a Romanian deadlift since you reset from the floor.",
  "Close-Grip Barbell Incline Press": "The ~45° incline shifts the emphasis to the upper chest. The close grip (just outside shoulder width) adds significant tricep involvement. The 8/5/12 rep scheme is prescribed — set 1 is 8 reps, set 2 goes heavier for 5, set 3 is a lighter back-off for 12.",
  "Chin-Up": "Underhand grip recruits more bicep than a pronated pull-up, making it a good choice on the full body day where biceps aren't otherwise directly trained. Pull your chest to the bar — don't stop when your chin clears. Add weight with a belt if bodyweight is easy.",
  "Leg Press": "Medium foot width and height on the platform. Don't allow your lower back to round at the bottom — keep your butt in contact with the pad. In Phase 3, the 20-rep sets will challenge your conditioning as much as your muscle.",
  "Kroc Row": "A dumbbell row with mild cheating and a slightly more upright torso than a strict row. Don't be afraid to go heavy and use straps — grip should never be the limiting factor. Use slight momentum on the concentric, but control the eccentric. Named after powerlifter Matt Kroczaleski.",
  "Diamond Pushup": "Hands close together forming a diamond shape directly under your chest. This shifts emphasis onto the triceps. Do as many reps as possible with a smooth, controlled tempo. The session finisher — grind it out.",
  // ── Phase 2 specific ───────────────────────────────────
  "Squat / Machine Squat": "Phase 2 squat is still 1 top set per week — the same minimalist strength approach as Phase 1 but now everything else in the session is pushed to RPE 10. The squat stays at RPE 8-9 to protect recovery for the rest of the workout.",
  "Leg Extension": "Squeeze your quads to make the weight move — don't just kick your leg up. The leg extension isolates the quad by removing the hip flexor contribution. Control the eccentric. In Phase 2, this goes to RPE 10 — true failure.",
  "High-Incline Smith Machine Press": "Set the bench at 45-60° — much higher than a standard incline. This angle shifts emphasis to the upper chest and front delt. Touch the bar to your upper chest with control. The Smith machine makes it easier to go to true failure safely.",
  "Egyptian Cable Lateral Raise": "Lean away from the cable stack with your free hand holding the top of the stack for support. This lean creates a longer moment arm on the lateral delt and allows for a better stretch at the bottom of the movement.",
  "Overhead Cable Triceps Extension": "The overhead position puts the long head of the tricep in a fully stretched position — this stretch-focused training is a key hypertrophy driver. Both arms work simultaneously. Resist the negative with full control.",
  "Cable Triceps Kickback": "Lean your torso forward and lock your elbow behind your torso — shoulder hyperextension positions the tricep for full contraction. Don't let the elbow move; all motion comes from the elbow joint only.",
  "Neutral-Grip Lat Pulldown": "Neutral grip (palms facing each other) allows most people to pull more weight than a wide overhand grip, making it well suited for Phase 2's heavy approach. Pull your elbows straight down against your sides.",

  "Hammer Cheat Curl": "Slight momentum on the concentric is allowed and intentional — this is the 'acceptable cheating' Jeff references in the program. However, control the eccentric strictly with your elbows stationary. You can use slightly more weight than a strict curl.",
  "Hack Squat (W1,3) / Deadlift (W2,4)": "The Full Body session alternates each week in Phase 2. Weeks 1 & 3 use Hack Squat to emphasize quads (go to RPE 9-10). Weeks 2 & 4 use Deadlift (RPE 8-9 to protect recovery). Both go to near-failure.",
  "Hack Squat": "Allow your knees to travel forward past your toes — this is correct technique on a hack squat. The more vertical torso compared to a barbell squat creates more direct quad loading. Keep your back flat against the pad.",
  "Seated DB Shoulder Press": "Bring the dumbbells all the way down to shoulder height or below — full ROM. Keep your torso upright rather than arching aggressively. In Phase 2, this goes to RPE 10 (true failure) every set.",
  "Close-Grip Seated Cable Row": "Focus on retracting your shoulder blades — squeeze them together hard at the end range. Drive your elbows down and back, not just back. Keep the torso relatively upright; don't lean back excessively.",
  "Weighted Dip": "Tuck your elbows at 45 degrees — not flared wide, not pinned straight in. Lean your torso forward ~15 degrees. Shoulder-width or slightly wider grip. This combination maximizes pec activation while protecting the shoulder.",

  "Slow Seated Leg Curl (3s up, 3s down)": "The slow tempo is the entire point — 3 seconds on the way up, 3 seconds on the way down. This creates extended time under tension and will be humbling with the load you use. Don't rush the tempo.",
  "LLPT Plank": "LLPT stands for Legs, Lats, Pelvis, Tension. Squeeze your glutes, engage your lats by thinking about pulling your elbows toward your feet, tuck your pelvis slightly, and brace your entire midsection. This turns a standard plank into a full-body tension exercise.",

const AT = {
  get token()   { return localStorage.getItem('ppl_at_token') || ''; },
  set token(v)  { localStorage.setItem('ppl_at_token', v); },
  get baseId()  { return localStorage.getItem('ppl_at_base') || ''; },
  set baseId(v) { localStorage.setItem('ppl_at_base', v); },
  get tableId() { return localStorage.getItem('ppl_at_table') || ''; },
  set tableId(v){ localStorage.setItem('ppl_at_table', v); },
  hdrs() { return { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' }; }
};

// Pre-fill credentials on first load
if (!AT.token)   AT.token   = '';
if (!AT.baseId)  AT.baseId  = 'appPG37ShuPzfT8Zc';
if (!AT.tableId) AT.tableId = 'tbl9BrCS9BxHkllCg';

// Fields we need in the table
const REQUIRED_FIELDS = [
  { name:'Date',        type:'date',            options:{ dateFormat:{ name:'iso' } } },
  { name:'Phase',       type:'number',          options:{ precision:0 } },
  { name:'Week',        type:'number',          options:{ precision:0 } },
  { name:'Session',     type:'singleLineText' },
  { name:'Exercise',    type:'singleLineText' },
  { name:'Sub Used',    type:'singleLineText' },
  { name:'Sets Logged', type:'singleLineText' },
  { name:'My Note',     type:'singleLineText' },
  { name:'Completed',   type:'checkbox',        options:{ color:'greenBright', icon:'check' } },
];

let _fieldsReady = false;
async function ensureFields() {
  if (_fieldsReady) return;
  // Verify token works with a simple record read
  const r = await fetch(
    `https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}?maxRecords=1`,
    { headers: AT.hdrs() }
  );
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`Cannot reach table: ${txt}`);
  }
  _fieldsReady = true;
}

async function syncToAirtable(record) {
  if (!AT.token) throw new Error('No Airtable token configured.');
  await ensureFields();

  const base = AT.baseId, tbl = AT.tableId;
  const { phase, week, session } = record;

  // Delete existing rows for this session
  const formula  = encodeURIComponent(`AND({Phase}=${phase},{Week}=${week},{Session}="${session}")`);
  const listR    = await fetch(`https://api.airtable.com/v0/${base}/${tbl}?filterByFormula=${formula}`, { headers: AT.hdrs() });
  if (!listR.ok) { const e=await listR.json(); throw new Error(e.error?.message||`HTTP ${listR.status}`); }
  const listData = await listR.json();
  const ids      = (listData.records||[]).map(r=>r.id);
  for (let i=0; i<ids.length; i+=10) {
    const qs = ids.slice(i,i+10).map(id=>`records[]=${id}`).join('&');
    const dr = await fetch(`https://api.airtable.com/v0/${base}/${tbl}?${qs}`, { method:'DELETE', headers:AT.hdrs() });
    if (!dr.ok) { const e=await dr.json(); throw new Error(e.error?.message||`Delete failed`); }
  }

  // Build and insert new rows (one per exercise)
  const rows = Object.entries(record.exercises||{}).map(([exName,exd])=>{
    const sel  = exd.selectedSub||0;
    const sub  = sel===1?(exd.sub1||exName):sel===2?(exd.sub2||exName):exName;
    const sets = (exd.sets||[]).map((s,i)=>`#${i+1} ${s.weight||'—'}×${s.reps||'—'}${s.done?' ✓':''}`).join(', ');
    return { fields:{
      'Name':        `P${phase}W${week} ${session} — ${exName}`,
      'Date':        record.date||'',
      'Phase':       phase,
      'Week':        week,
      'Session':     session,
      'Exercise':    exName,
      'Sub Used':    sub,
      'Sets Logged': sets,
      'My Note':     exd.note||'',
      'Completed':   !!record.completed
    }};
  });
  for (let i=0; i<rows.length; i+=10) {
    const pr = await fetch(`https://api.airtable.com/v0/${base}/${tbl}`, {
      method:'POST', headers:AT.hdrs(),
      body: JSON.stringify({ records: rows.slice(i,i+10) })
    });
    if (!pr.ok) { const e=await pr.json(); throw new Error(e.error?.message||`Insert failed`); }
  }
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtSets(sets){ return sets.map((s,i)=>`#${i+1} ${s.weight||'—'}×${s.reps||'—'}`).join('  '); }

function freshSets(ex, wIdx) {
  return Array(ex.working[wIdx]).fill(null).map(()=>({weight:'',reps:'',done:false}));
}

// Get most recent log entry for an exercise across any session
function getLastLog(exName) {
  const all = DB.all();
  const current = S.sessionKey_k;
  const matches = Object.entries(all)
    .filter(([k, rec]) => k !== current && rec.exercises?.[exName]?.sets?.some(s => s.done))
    .sort((a, b) => (b[1].date||'').localeCompare(a[1].date||''));
  if (!matches.length) return null;
  return matches[0][1].exercises[exName];
}

// Get previous-week data for same exercise across same session type
function getPrevPerf(exName) {
  const phase = getPhase();
  const results = [];
  for (let w = S.weekIdx - 1; w >= 0; w--) {
    const k = sKey(S.phaseIdx, w, S.sessionKey);
    const rec = DB.get(k);
    if (rec && rec.exercises && rec.exercises[exName]) {
      const exData = rec.exercises[exName];
      if (exData.sets && exData.sets.some(s=>s.done)) {
        results.push({ week: w+1, date: rec.date, sets: exData.sets });
        if (results.length >= 2) break;
      }
    }
  }
  return results;
}

function getNotes(exName) {
  const all = DB.all();
  const notes = [];
  for (const [k, rec] of Object.entries(all)) {
    if (rec.exercises && rec.exercises[exName] && rec.exercises[exName].note) {
      notes.push({ date: rec.date, phase: rec.phase, week: rec.week, session: rec.session, text: rec.exercises[exName].note });
    }
  }
  return notes.sort((a,b)=>b.date.localeCompare(a.date));
}

function editSession(k, sk) {

  S.weekIdx   = rec.week  - 1;
  S.sessionKey = sk;
  S.sessionKey_k = k;
  // Load existing data
  S.wo = JSON.parse(JSON.stringify(rec)); // deep clone
  S.exIdx = 0;
  showWorkout();

// ═══════════════════════════════════════════════════════════
function resumeWorkout(k) {
  const rec = DB.get(k);
  if (!rec) return;
  S.phaseIdx    = rec.phase - 1;
  S.weekIdx     = rec.week  - 1;
  S.sessionKey  = rec.session;
  S.sessionKey_k = k;
  S.wo          = rec;
  S.exIdx       = parseInt(localStorage.getItem('ppl_nav') ? JSON.parse(localStorage.getItem('ppl_nav')).exIdx : 0) || 0;
  showWorkout();
}

function startSession(sk) {
  S.sessionKey = sk;
  S.sessionKey_k = sKey(S.phaseIdx, S.weekIdx, sk);
  S.exIdx = 0;

  // Check if existing (editing)
  const existing = DB.get(S.sessionKey_k);
  if (existing && !existing.completed) {
    S.wo = existing;
    autosave();
    showWorkout();
  } else {
    const exercises = {};
    const phase = getPhase();
    (phase.sessions[sk]||[]).forEach(ex=>{
      exercises[ex.name] = { selectedSub:0, sets: freshSets(ex, S.weekIdx), note:'' };
    });
    S.wo = {
      phase: S.phaseIdx+1, week: S.weekIdx+1, session: sk,
      date: new Date().toISOString().split('T')[0],
      completed: false, exercises
    };
    autosave();
    S.exIdx = -1; // start on warmup tab
    showWorkout();
  }
}

function autosave() {
  if (S.wo) DB.set(S.sessionKey_k, S.wo);
}

    if (isLeg) {
      wu += item('Front/Back Leg Swing','1 set · 12 each leg · leg days only');
      wu += item('Side/Side Leg Swing','1 set · 12 each leg · leg days only');
    }
    wu += item('Foam Rolling','Optional · 0-3 min · quads, lats, calves');
    const phaseNote = PHASE_NOTES[S.phaseIdx] || '';
    wu += `<div style="background:var(--su);border:1px solid var(--ac);border-radius:10px;padding:14px 16px;margin-top:16px">

      <div style="font-size:14px;color:#ccc;line-height:1.6">${phaseNote}</div>
    </div>`;
    wu += `<div style="margin-top:8px;font-size:12px;color:var(--mu);line-height:1.6">Exercise-specific warm-up sets are shown on each exercise card below.</div>`;
    document.getElementById('wo-body').innerHTML = `<div style="padding:16px;padding-bottom:100px">${wu}</div>`;
    document.getElementById('wo-nav').innerHTML = `
      <div style="flex:1"></div>
      <button class="btn btn-primary" style="flex:2;padding:14px 0;font-size:15px;border-radius:10px" onclick="navEx(1)">Start Workout →</button>`;
    return;
  }

  const ex = exercises[S.exIdx];
  if (!ex) return;

  const exd = S.wo.exercises[ex.name] || { selectedSub:0, sets:freshSets(ex, S.weekIdx), note:'' };
  S.wo.exercises[ex.name] = exd;
  const allCurDone = exd.sets.every(s=>s.done);
  const selSub = exd.selectedSub||0;
  const displayName = selSub===1 ? ex.sub1 : selSub===2 ? ex.sub2 : ex.name;
  const last = getLastLog(ex.name);

  // Previous performance (other weeks, same exercise + session type)
  const prevPerf = getPrevPerf(ex.name);
  const myNotes  = getNotes(ex.name);

  // Subs
  const subs = [ex.name];
  if (ex.sub1 && ex.sub1!=='—') subs.push(ex.sub1);
  if (ex.sub2 && ex.sub2!=='—') subs.push(ex.sub2);

  let body = '';

  // Title
  const ytUrl = YT[ex.name] || YT[displayName] || null;
  body += `<div style="margin-bottom:12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div style="flex:1;min-width:0">
      <div class="ex-title">${esc(displayName)}</div>
      ${selSub>0?`<div style="font-size:12px;color:var(--ac2);margin-top:2px">↳ substitution</div>`:''}
    </div>
    ${ytUrl?`<a href="${ytUrl}" target="_blank" rel="noopener" style="flex-shrink:0;background:#ff0000;color:#fff;border-radius:6px;padding:7px 11px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:4px;margin-top:4px;-webkit-tap-highlight-color:transparent">▶ YT</a>`:''}
  </div>`;

  // Stats
  const wSets=ex.working[S.weekIdx], wReps=ex.reps[S.weekIdx], wRpe=ex.rpe[S.weekIdx];
  body += `<div class="stat-grid" style="margin-bottom:14px">
    ${[['SETS',wSets],['REPS',wReps],['RPE',wRpe],['REST',ex.rest]].map(([l,v])=>`
      <div class="stat-box"><div class="stat-lbl">${l}</div><div class="stat-val">${esc(v)}</div></div>`).join('')}
  </div>`;

  // Warmup guide
  if (ex.warmup!=='0') {
    const nWu = ex.warmup.includes('-') ? parseInt(ex.warmup.split('-')[1]) : parseInt(ex.warmup);
    // Get target weight: current set 1 entry or last session set 1
    const curW = exd.sets[0]?.weight;
    const lastW = last?.sets[0]?.weight;
    const targetW = curW || lastW || '';
    const wuSets = calcWarmupSets(nWu, targetW, wReps, S.phaseIdx);

    body += `<div style="background:var(--su);border:1px solid var(--br);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div class="sec-lbl" style="margin-bottom:8px">Warm-up Guide (${ex.warmup} set${nWu!==1?'s':''})</div>`;

    if (wuSets.length) {
      wuSets.forEach(ws => {
        const wLabel = ws.weight ? `<strong style="color:var(--ac2)">${ws.weight} lbs</strong>` : `<strong style="color:var(--ac2)">~${ws.pct}%</strong>`;
        body += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:14px">
          <span style="color:var(--mu);min-width:42px">${ws.label}</span>
          ${wLabel}
          <span style="color:var(--mu)">×</span>
          <span>${ws.reps} reps</span>
        </div>`;
      });
      if (!targetW) body += `<div style="font-size:12px;color:var(--mu);margin-top:4px">Enter your working weight above to get exact numbers</div>`;
    } else {
      body += `<div style="font-size:13px;color:var(--mu)">Enter your working weight to calculate warm-up weights</div>`;

    body += `<div style="margin-bottom:14px"><div class="sec-lbl">Exercise</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;

}

function updSet(i, field, val) {
  const ex = getEx(); if(!ex) return;
  const exd = S.wo.exercises[ex.name];
  if (exd && exd.sets[i]) { exd.sets[i][field]=val; autosave(); }
}

function togDone(i) {
  const ex = getEx(); if(!ex) return;
  const exd = S.wo.exercises[ex.name]; if(!exd) return;
  const s = exd.sets[i];
  // Auto-fill from previous set or last logged
  let w=s.weight, r=s.reps;
  if (!s.done && !w && !r) {
    for (let j=i-1;j>=0;j--) { if(exd.sets[j].weight||exd.sets[j].reps){w=exd.sets[j].weight;r=exd.sets[j].reps;break;} }
    if (!w&&!r) {
      const prev=getPrevPerf(ex.name);
      if (prev.length&&prev[0].sets[i]) { w=prev[0].sets[i].weight; r=prev[0].sets[i].reps; }
      else if (prev.length&&prev[0].sets[0]) { w=prev[0].sets[0].weight; r=prev[0].sets[0].reps; }
    }
  }
  exd.sets[i]={...s, weight:w, reps:r, done:!s.done};
  autosave(); renderWorkout();
}

function setSub(i) {
  const ex=getEx(); if(!ex) return;
  S.wo.exercises[ex.name].selectedSub=i;
  autosave(); renderWorkout();
}

function updNote(val) {
  const ex=getEx(); if(!ex) return;
  S.wo.exercises[ex.name].note=val;
  autosave();
}

function jumpEx(i) { S.exIdx=i; saveNavState(); renderWorkout(); }

function navEx(dir) {
  const next = S.exIdx+dir;
  const exes = getExercises();
  if (next>=-1&&next<exes.length) { S.exIdx=next; saveNavState(); renderWorkout(); }
}

async function finishSession() {
  S.wo.completed = true;
  S.wo.date = new Date().toISOString().split('T')[0];
  autosave();
  showHome();
  try { await syncToAirtable(S.wo); showToast('Synced to Airtable ✓', 'var(--gr)'); }
  catch(e) { showToast('Saved locally. Airtable sync failed.', 'var(--ac)'); }
}

function showToast(msg, color) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;font-family:'DM Sans',sans-serif;white-space:nowrap`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ─── DURATION ESTIMATE ──────────────────────────────────
function parseRest(r) {
  if (!r || r === '0 min') return 0;
  if (r.includes('15 sec')) return 0.25;
  const range = r.match(/(\d+)[–-](\d+)\s*min/);
  if (range) return (parseInt(range[1]) + parseInt(range[2])) / 2;
  const single = r.match(/(\d+)\s*min/);
  if (single) return parseInt(single[1]);
  return 2;
}
function parseWarmup(w) {
  if (!w || w === '0') return 0;
  const range = w.match(/(\d+)[–-](\d+)/);
  if (range) return (parseInt(range[1]) + parseInt(range[2])) / 2;
  return parseFloat(w) || 0;
}
function calcDuration(phaseIdx, weekIdx, sessionKey) {
  const exercises = PROGRAM.phases[phaseIdx].sessions[sessionKey] || [];
  let mins = 10; // general warmup
  exercises.forEach(ex => {
    const wu   = parseWarmup(ex.warmup);
    const ws   = ex.working[weekIdx] || 1;
    const rest = parseRest(ex.rest);
    mins += wu * 1.5;          // warmup sets: ~1.5 min each
    mins += ws * (rest + 0.75); // working sets: rest + ~45s execution
    mins += 1;                  // transition
  });
  const lo = Math.round(mins / 5) * 5;
  const hi = lo + 10;
  return `~${lo}–${hi} min`;
}

// ─── WARMUP ───────────────────────────────────────────────
function calcWarmupSets(numWarmup, targetWeight, targetReps, phaseIdx) {
  const n = parseInt(numWarmup) || 0;
  if (n === 0) return [];
  const w = parseFloat(targetWeight);
  const rInt = parseInt(targetReps) || 8;

  // Phase 3 high-rep protocol (15+ reps)
  if (phaseIdx === 2 && rInt >= 15) {
    if (n === 1) return [{ label:'Set 1', pct:60, weight: w ? Math.round(w*0.6) : null, reps:'5-10' }];
    return [
      { label:'Set 1', pct:50, weight: w ? Math.round(w*0.5) : null, reps:'5-10' },
      { label:'Set 2', pct:70, weight: w ? Math.round(w*0.7) : null, reps:'5-10' }
    ];
  }

  // Phase 1 & 2 protocol
  const fewerReps = r => Math.max(Math.round(r * 0.65), 2);
  const evenFewer = r => Math.max(Math.round(r * 0.45), 1);

  if (n === 1) return [
    { label:'Set 1', pct:60, weight: w ? Math.round(w*0.6) : null, reps: String(rInt) }
  ];
  if (n === 2) return [
    { label:'Set 1', pct:50, weight: w ? Math.round(w*0.5) : null, reps: String(rInt) },
    { label:'Set 2', pct:70, weight: w ? Math.round(w*0.7) : null, reps: String(fewerReps(rInt)) }
  ];
  // 3 or 3-4
  return [
    { label:'Set 1', pct:45, weight: w ? Math.round(w*0.45) : null, reps: String(rInt) },
    { label:'Set 2', pct:65, weight: w ? Math.round(w*0.65) : null, reps: String(fewerReps(rInt)) },
    { label:'Set 3', pct:85, weight: w ? Math.round(w*0.85) : null, reps: String(evenFewer(rInt)) }
  ];
}

function renderHistory() {
  const all = DB.all();
  const sessions = Object.entries(all).sort((a,b)=>b[1].date?.localeCompare(a[1].date||'')||0);
  const total = sessions.length;
  document.getElementById('hist-sub').textContent = `${total} session${total!==1?'s':''} logged`;

  if (!total) {
    document.getElementById('hist-body').innerHTML = `<div style="color:var(--mu);text-align:center;padding:60px 0;font-size:15px">No sessions logged yet.<br>Go crush a workout!</div>`;
    return;
  }

  let html = '';
  sessions.forEach(([k,rec])=>{
    const sk = rec.session||'';
    const exList = (PROGRAM.phases[rec.phase-1]?.sessions[sk]||[]);
    const filled = exList.slice(0,3).map(e=>{
      const exd=rec.exercises?.[e.name]; if(!exd) return null;
      const w=exd.sets?.filter(s=>s.weight); if(!w?.length) return null;
      return `${e.name.split(' ')[0]}: ${w.map(s=>s.weight+'lbs').join('/')}`;
    }).filter(Boolean);

    html += `<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="openDetail('${esc(k)}','${esc(sk)}')">
      <div class="hist-row">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">

function saveATToken() {
  AT.token = document.getElementById('at-token-input').value.trim();
  AT.baseId = ''; AT.tableId = ''; // force re-discovery
  document.getElementById('at-status').innerHTML = '<span style="color:var(--gr)">✓ Saved — will connect on next session finish</span>';
}

async function testAirtable() {
  const statusEl = document.getElementById('at-status');
  statusEl.textContent = 'Testing…';
  const tok = document.getElementById('at-token-input').value.trim();
  if (tok) AT.token = tok;
  _fieldsReady = false; // force re-check
  try {
    await ensureFields();
    statusEl.innerHTML = `<span style="color:var(--gr)">✓ Connected — all fields ready.</span>`;
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--ac)">Failed: ${e.message}</span>`;
  }
}

async function syncAll() {
  const el = document.getElementById('sync-all-status');
  const all = DB.all();
  const sessions = Object.values(all);
  if (!sessions.length) { el.textContent = 'Nothing to sync.'; return; }
  el.textContent = `Syncing ${sessions.length} sessions…`;
  let ok = 0, errs = [];
  for (const rec of sessions) {
    try { await syncToAirtable(rec); ok++; }
    catch(e) { errs.push(e.message); }
  }
  if (errs.length) {
    el.innerHTML = `<span style="color:var(--ac)">✓ ${ok} synced, ${errs.length} failed: ${errs[0]}</span>`;
  } else {
    el.textContent = `✓ Synced ${ok}/${sessions.length} sessions`;
  }
}

// Pull all records from Airtable and populate localStorage
async function pullFromAirtable() {
  document.getElementById('sync-all-status').textContent = 'Pulling from Airtable…';
  try {
    let allRecords = [], offset = null;
    do {
      const url = `https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}` + (offset ? `?offset=${offset}` : '');
      const r = await fetch(url, { headers: AT.hdrs() });
      if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || `HTTP ${r.status}`); }
      const data = await r.json();
      allRecords = allRecords.concat(data.records || []);
      offset = data.offset || null;
    } while (offset);

    // Group records back into session objects
    const sessionMap = {};
    allRecords.forEach(rec => {
      const f = rec.fields;
      const phase = f['Phase'], week = f['Week'], session = f['Session'], exName = f['Exercise'];
      if (!phase || !week || !session || !exName) return;
      const k = sKey(phase - 1, week - 1, session);
      if (!sessionMap[k]) {
        sessionMap[k] = { phase, week, session, date: f['Date']||'', completed: !!f['Completed'], exercises: {} };
      }
      // Parse "Sets Logged": "#1 185×4 ✓, #2 185×4 ✓"
      const sets = (f['Sets Logged']||'').split(', ').filter(Boolean).map(s => {
        const m = s.match(/#\d+\s+([^×]+)×([^\s✓,]+)(\s*✓)?/);
        if (!m) return { weight:'', reps:'', done:false };
        return { weight: m[1].trim()==='—'?'':m[1].trim(), reps: m[2].trim()==='—'?'':m[2].trim(), done: !!m[3] };
      });
      sessionMap[k].exercises[exName] = { selectedSub:0, sets, note: f['Note']||'' };
    });

    // Write into localStorage (Airtable wins on conflict)
    Object.entries(sessionMap).forEach(([k,rec]) => DB.set(k, rec));
    const count = Object.keys(sessionMap).length;
    document.getElementById('sync-all-status').textContent = `✓ Pulled ${count} sessions from Airtable`;
    renderHome();
  } catch(e) {
    document.getElementById('sync-all-status').textContent = `Failed: ${e.message}`;
  }
}

function buildCSV() {
  const all = DB.all();
  const rows = [["Date","Phase","Week","Session","Exercise","Sub Used","Set #","Weight (lbs)","Reps","Done","Note"]];
  const sessions = Object.values(all).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  sessions.forEach(rec => {
    const exList = PROGRAM.phases[(rec.phase||1)-1]?.sessions[rec.session] || [];
    exList.forEach(ex => {
      const exd = rec.exercises?.[ex.name]; if (!exd) return;
      const selSub = exd.selectedSub||0;
      const subUsed = selSub===1?ex.sub1 : selSub===2?ex.sub2 : ex.name;
      const sets = exd.sets || [];
      if (!sets.length) {
        rows.push([rec.date||'',rec.phase||'',rec.week||'',rec.session||'',ex.name,subUsed,'','','','',exd.note||'']);
      } else {
        sets.forEach((s,i)=>rows.push([
          i===0?(rec.date||''):'', i===0?(rec.phase||''):'', i===0?(rec.week||''):'',
          i===0?(rec.session||''):'', i===0?ex.name:'', i===0?subUsed:'',
          i+1, s.weight||'', s.reps||'', s.done?'Yes':'No', i===0?(exd.note||''):''
        ]));
      }
    });
  });
  return rows.map(r=>r.map(cell=>{
    const s=String(cell);
    return (s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`  :s;
  }).join(',')).join('\n');
}

async function exportCSV() {
  const csv      = buildCSV();
  const filename = `ppl-tracker-${new Date().toISOString().split('T')[0]}.csv`;

  // iOS Safari: use Web Share API to send to Files / Mail / Sheets etc.
  if (navigator.canShare) {
    try {
      const file = new File([csv], filename, {type:'text/csv'});
      if (navigator.canShare({files:[file]})) {
        await navigator.share({files:[file], title:'PPL Tracker Export'});
        return;
      }
    } catch(e) { if (e.name==='AbortError') return; } // user cancelled share sheet
  }

  // Desktop fallback: trigger download
  try {
    const blob = new Blob([csv],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'),{href:url,download:filename});
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    return;
  } catch(e){}

  // Final fallback: show in a modal so they can copy-paste
  showExportModal(csv);
}

function showExportModal(csv) {
  const existing = document.getElementById('export-modal');

  const modal = document.createElement('div');

  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;flex-direction:column;padding:20px;gap:12px';
  modal.innerHTML = `

      <button onclick="document.getElementById('export-modal').remove()" style="background:transparent;border:1px solid var(--br);color:var(--mu);border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer">Close</button>
    </div>
    <div style="font-size:13px;color:var(--mu)">Copy all of this, then paste into a new Google Sheet (paste into cell A1).</div>
    <textarea id="csv-output" style="flex:1;font-size:11px;font-family:monospace;background:var(--su2);color:var(--tx);border:1px solid var(--br);border-radius:8px;padding:12px;white-space:pre">${esc(csv)}</textarea>
    <button onclick="document.getElementById('csv-output').select();document.execCommand('copy');this.textContent='✓ Copied!'" style="background:var(--ac);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;font-family:\'DM Sans\',sans-serif">Copy to Clipboard</button>`;
  document.body.appendChild(modal);
  document.getElementById('csv-output').select();
}

function copyJSON() {
  const data = localStorage.getItem('ppl_v2') || '{}';
  navigator.clipboard.writeText(data).then(()=>{
    document.getElementById('copy-status').textContent = '✓ Copied to clipboard';
    setTimeout(()=>{ document.getElementById('copy-status').textContent=''; }, 3000);
  }).catch(()=>{
    // Fallback for older iOS
    const ta = document.createElement('textarea');
    ta.value = data; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copy-status').textContent = '✓ Copied to clipboard';
    setTimeout(()=>{ document.getElementById('copy-status').textContent=''; }, 3000);
  });
}

}

function resetAll() {
